<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AndroidTV Apps</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaa;
            --border-color: #2d2d2d;
            --primary-color: #ffeb3b;
            --primary-hover: #fdd835;
            --btn-text: #000000;
        }
        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666;
            --border-color: #e0e0e0;
            --primary-color: #fbc02d;
            --primary-hover: #f57f17;
            --btn-text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; text-align: center; }
        header { margin-bottom: 30px; }
        h1 { color: var(--primary-color); margin-bottom: 10px; }
        p { color: var(--text-muted); font-size: 14px; }
        .theme-toggle-container { display: flex; justify-content: flex-end; max-width: 1200px; margin: 0 auto 10px; }
        .theme-btn { background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .search-container { max-width: 500px; margin: 0 auto 20px; }
        .search-box { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); font-size: 16px; outline: none; }
        .categories-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .category-btn { background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .category-btn.active { background: var(--primary-color); color: var(--btn-text); font-weight: bold; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; text-align: right; }
        .app-card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; text-decoration: none; color: var(--text-color); display: block; border: 1px solid var(--border-color); }
        .app-icon { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; margin-bottom: 12px; background: #2d2d2d; }
        .app-name { font-size: 14px; font-weight: bold; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .download-btn { background: var(--border-color); color: var(--text-color); padding: 6px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; display: inline-block; width: 100%; }
    </style>
</head>
<body>

    <div class="theme-toggle-container">
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌙 الوضع الليلي</button>
    </div>

    <header>
        <h1>تطبيقات AndroidTV</h1>
        <p>Andoid TV Apps Oussama Echifa</p>
    </header>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="ابحث عن تطبيق معين...">
    </div>

    <div class="categories-container">
        <button class="category-btn active" onclick="filterCategory('all', this)">الكل</button>
        <button class="category-btn" onclick="filterCategory('live', this)">بث مباشر</button>
        <button class="category-btn" onclick="filterCategory('movies', this)">أفلام ومسلسلات</button>
        <button class="category-btn" onclick="filterCategory('tools', this)">أدوات ونظام</button>
    </div>

    <div class="apps-grid" id="appsGrid"></div>

    <script>
        const apps = [
            { name: "Sportzx_TV", category: "live", icon: "https://github.com/fagmixy/TVappsOE/raw/refs/heads/main/img/sportzx.png", url: "https://github.com/fagmixy/TVappsOE/raw/refs/heads/main/apps/SportzX_TV.apk" },
            { name: "تطبيق الأسطورة", category: "live", icon: "https://placeholder.com", url: "https://example.com" },
            { name: "شاهد الأندرويد", category: "movies", icon: "https://placeholder.com", url: "https://example.com" },
            { name: "تطبيق نتفليكس TV", category: "movies", icon: "https://placeholder.com", url: "https://example.com" },
            { name: "Smart YouTube", category: "movies", icon: "https://placeholder.com", url: "https://example.com" },
            { name: "متصفح الشاشات Puffin", category: "tools", icon: "https://placeholder.com", url: "https://example.com" },
            { name: "مستكشف الملفات", category: "tools", icon: "https://placeholder.com", url: "https://example.com" }
        ];

        const appsGrid = document.getElementById('appsGrid');
        const searchInput = document.getElementById('search');
        const themeToggleBtn = document.getElementById('themeToggle');
        let currentCategory = 'all';

        function displayApps(appsList) {
            appsGrid.innerHTML = "";
            if(appsList.length === 0) {
                appsGrid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--text-muted); padding: 20px;'>لم يتم العثور على أي تطبيق</p>";
                return;
            }
            appsList.forEach(app => {
                appsGrid.innerHTML += `
                    <a href="${app.url}" class="app-card" target="_blank">
                        <img src="${app.icon}" alt="${app.name}" class="app-icon">
                        <div class="app-name">${app.name}</div>
                        <span class="download-btn">تحميل APK</span>
                    </a>
                `;
            });
        }

        function filterCategory(category, buttonElement) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            applyFilter();
        }

        function applyFilter() {
            const searchTerm = searchInput.value.toLowerCase();
            const filtered = apps.filter(app => {
                const matchesCategory = (currentCategory === 'all' || app.category === currentCategory);
                const matchesSearch = app.name.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });
            displayApps(filtered);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggleBtn.innerHTML = "🌙 الوضع الليلي";
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggleBtn.innerHTML = "☀️ الوضع النهاري";
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'light') {
            themeToggleBtn.innerHTML = "☀️ الوضع النهاري";
        } else {
            themeToggleBtn.innerHTML = "🌙 الوضع الليلي";
        }

        displayApps(apps);
        searchInput.addEventListener('input', applyFilter);
    </script>
</body>
</html>
